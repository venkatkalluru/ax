server:
  address: ":8494"

eventlog:
  sqlite:
    filename: "eventlog/log.sqlite"

planner:
  # Type of planner to use: "gemini" (default: "gemini")
  type: "gemini"

  # The Gemini planner uses Google's Gemini models for planning.
  gemini:
    model: "gemini-3.5-flash"
    timeout: "60s"
