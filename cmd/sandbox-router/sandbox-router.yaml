apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-router
  labels:
    app: sandbox-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox-router
  template:
    metadata:
      labels:
        app: sandbox-router
    spec:
      containers:
      - name: router
        # TODO: consider other options instead of Alpine
        image: alpine:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          while [ ! -f /app/.done ]; do sleep 1; done
          echo "Starting router..."
          chmod +x /app/sandbox-router
          exec /app/sandbox-router
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: app-vol
          mountPath: /app
      volumes:
      - name: app-vol
        emptyDir: {}
