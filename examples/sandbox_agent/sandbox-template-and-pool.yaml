# This is the Kubernetes manifest defining the execution environment for the agent.
# It is applied strictly to the GKE Agent Sandbox controllers to define the Sandbox.
#
# AGENT SEGREGATION:
# To support multiple different agents, you MUST create a separate SandboxTemplate
# and SandboxWarmPool for each agent with different sandbox requirements. 
# The `sandboxTemplateRef` in the WarmPool and `gar.yaml` maps the GAR logic to the specific isolated environment.
#
# For more details on GKE Agent Sandbox container requirements, see:
# https://docs.cloud.google.com/kubernetes-engine/docs/how-to/agent-sandbox
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: uppercase-agent-template
  namespace: default
spec:
  podTemplate:
    spec:
      runtimeClassName: gvisor
      containers:
      - name: agent
        image: us-central1-docker.pkg.dev/a2a-ae-fishfood-eoeg5x/gar-repo/gar-uppercase:latest
        imagePullPolicy: Always
        env:
        - name: PORT
          value: "8494"
        ports:
        - containerPort: 8494
          name: grpc
        readinessProbe:
          tcpSocket:
            port: 8494
          initialDelaySeconds: 1
          periodSeconds: 2
---
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxWarmPool
metadata:
  name: uppercase-agent-warmpool
  namespace: default
spec:
  replicas: 2
  sandboxTemplateRef:
    name: uppercase-agent-template
