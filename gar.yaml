# Server configuration
server:
  # Address to listen on (host:port)
  address: ":8494"

# Event log configuration
eventlog:
  # Directory where event logs are stored
  dir: "eventlog"

# Maximum number of steps per trigger
max_steps: 50

health_check:
  # Whether to enable active health checking
  enabled: true
  # Active health check interval for agents (e.g., "30s", "1m")
  interval: 30s

# Planner configuration (optional)
# planner:
#   # Gemini planner configuration
#   # The Gemini planner uses Google's Gemini models for intelligent agent selection.
#   gemini:
#     # Model name (e.g., "gemini-3-flash")
#     model: "gemini-3-flash-preview"
#     
#     # Temperature for generation (0.0 to 1.0)
#     temperature: 0.7
#     
#     # Maximum output tokens
#     max_tokens: 8192
#     
#     # Request timeout (e.g., "30s", "1m")
#     timeout: 60s
#     
#     # Number of recent messages to include in context
#     context_window: 30
#     
#     # Custom system prompt for the planner (optional)
#     system_prompt: ""

# Remote agents configuration (optional)
# List of remote agents to register on startup.
# Remote agents run as separate gRPC servers.
#
# remote_agents:
#   - id: "python-agent"
#     name: "Python Agent"
#     description: "Python-based agent for text processing"
#     address: "localhost:50051"
#     metadata:
#       version: "1.0"
