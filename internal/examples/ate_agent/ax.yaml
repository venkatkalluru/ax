server:
  address: ":8494"

# Event log configuration
eventlog:
  sqlite:
    filename: "eventlog/log.sqlite"

planner:
  gemini:
    model: "gemini-3-flash-preview"
    timeout: "60s"

ate:
  endpoint: "localhost:35601"

registry:
  ate_agents:
    - id: "hello-world"
      name: "Hello World"
      description: "Responds with 'Hello World'"
      port: 8494
      namespace: "ate-agent-example"
      template: "ate-agent-template"
