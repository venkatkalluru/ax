# TODO(jbd): This yaml will eventually become the ax-deployment.yaml.tmpl.

# ---------------------------------------------------------------------------
# Namespaces
# ---------------------------------------------------------------------------
# Namespace "ax" is reserved for built-in harnesses. Users who bring their own
# harness images should add their own namespaces.
apiVersion: v1
kind: Namespace
metadata:
  name: ax
---
# ---------------------------------------------------------------------------
# Built-in harnesses
# ---------------------------------------------------------------------------
apiVersion: ate.dev/v1alpha1
kind: WorkerPool
metadata:
  name: ax-harness-workerpool
  namespace: ax
spec:
  replicas: 5
  ateomImage: ${ATEOM_IMAGE}
---
apiVersion: ate.dev/v1alpha1
kind: ActorTemplate
metadata:
  name: ax-harness-template
  namespace: ax
spec:
  workerPoolRef:
    name: ax-harness-workerpool
    namespace: ax
  pauseImage: "gcr.io/gke-release/pause@sha256:bcbd57ba5653580ec647b16d8163cdd1112df3609129b01f912a8032e48265da"
  containers:
    - name: "axharness"
      image: ${AX_IMAGE}
      # Substrate ignores the image CMD/ENV/WORKDIR, so the harness command and
      # environment are specified here. `ax harness` forks the Antigravity Python
      # sidecar, which serves on port 80 because substrate DNATs workerPodIP:80.
      command: ["/ax", "harness",
                "--antigravity-agent-file", "/app/examples/antigravity_agent/agent.py",
                "--host", "0.0.0.0", "--port", "80"]
      env:
        - name: GEMINI_API_KEY
          value: "${GEMINI_API_KEY}"
        - name: PYTHONPATH
          value: "/app:/app/python"
        - name: PYTHONUNBUFFERED
          value: "1"
  snapshotsConfig:
    location: gs://${BUCKET_NAME}/antigravity/
---

# ---------------------------------------------------------------------------
# AX Server
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: ax-server
  namespace: ax
  labels:
    app: ax-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ax-server
  template:
    metadata:
      labels:
        app: ax-server
    spec:
      containers:
        - name: ax-server
          image: ${AX_IMAGE}
          command: ["/ax", "serve", "--config", "/etc/ax/ax.yaml"]
          ports:
            - containerPort: 8494
          env:
            - name: GEMINI_API_KEY
              value: "${GEMINI_API_KEY}"
            - name: AX_SUBSTRATE
              value: "1"
          volumeMounts:
            - name: ax-config
              mountPath: /etc/ax
      volumes:
        - name: ax-config
          configMap:
            name: ax-server-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ax-server-config
  namespace: ax
data:
  ax.yaml: |
    harnesses:
      antigravity:
        default: true
