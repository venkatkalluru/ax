# TODO(jbd): This yaml will eventually become the ax-deployment.yaml.tmpl.

# ---------------------------------------------------------------------------
# Namespaces
# ---------------------------------------------------------------------------
# Namespace "ax" is reserved for built-in harnesses. Users who bring their own
# harness images should add their own namespaces.
apiVersion: v1
kind: Namespace
metadata:
  name: ax
---
# ---------------------------------------------------------------------------
# Built-in harnesses
# ---------------------------------------------------------------------------
apiVersion: ate.dev/v1alpha1
kind: WorkerPool
metadata:
  name: ax-harness-workerpool
  namespace: ax
  labels:
    workload: ax-harness
spec:
  replicas: 5
  ateomImage: ${ATEOM_IMAGE}
---
apiVersion: ate.dev/v1alpha1
kind: ActorTemplate
metadata:
  name: ax-harness-antigravity-template
  namespace: ax
spec:
  workerSelector:
    matchLabels:
      workload: ax-harness
  pauseImage: "gcr.io/gke-release/pause@sha256:bcbd57ba5653580ec647b16d8163cdd1112df3609129b01f912a8032e48265da"
  containers:
    - name: "axantigravity"
      image: ${AX_IMAGE}
      # Substrate ignores the image CMD/ENV/WORKDIR, so the harness command and
      # environment are specified here. `ax harness antigravity` forks the
      # Antigravity Python sidecar, which serves on port 80 because substrate
      # DNATs workerPodIP:80.
      command: ["/ax-app/ax", "harness", "antigravity",
                "--host", "0.0.0.0", "--port", "80"]
      env:
        - name: GEMINI_API_KEY
          value: "${GEMINI_API_KEY}"
        - name: PYTHONPATH
          value: "/ax-app:/ax-app/python"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: SKILLS_DIR
          value: "/ax/skills"
        - name: AX_HARNESS_WORKDIR
          value: "/workspace"
      readyz:
        httpGet:
          path: /readyz
          port: 8081
  snapshotsConfig:
    location: gs://${AX_SNAPSHOTS_BUCKET}/axantigravity/
---
apiVersion: ate.dev/v1alpha1
kind: ActorTemplate
metadata:
  name: ax-harness-interactions-template
  namespace: ax
spec:
  workerSelector:
    matchLabels:
      workload: ax-harness
  pauseImage: "gcr.io/gke-release/pause@sha256:bcbd57ba5653580ec647b16d8163cdd1112df3609129b01f912a8032e48265da"
  containers:
    - name: "axinteractions"
      image: ${AX_IMAGE}
      # Substrate ignores the image CMD/ENV/WORKDIR, so the harness command and
      # environment are specified here. `ax harness antigravity-interactions` runs
      # the Go Interactions harness on port 80 because substrate DNATs workerPodIP:80.
      command: ["/ax-app/ax", "harness", "antigravity-interactions",
                "--host", "0.0.0.0", "--port", "80"]
      env:
        - name: PROJECT_ID
          value: "${PROJECT_ID}"
        - name: AX_HARNESS_WORKDIR
          value: "/workspace"
      readyz:
        httpGet:
          path: /readyz
          port: 8081
  snapshotsConfig:
    location: gs://${AX_SNAPSHOTS_BUCKET}/axinteractions/
---

# ---------------------------------------------------------------------------
# AX Server
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: ax-server
  namespace: ax
  labels:
    app: ax-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ax-server
  template:
    metadata:
      labels:
        app: ax-server
    spec:
      containers:
        - name: ax-server
          image: ${AX_IMAGE}
          command: ["/ax-app/ax", "serve", "--config", "/etc/ax/ax.yaml"]
          ports:
            - containerPort: 8494
          env:
            - name: GEMINI_API_KEY
              value: "${GEMINI_API_KEY}"
            - name: AX_SUBSTRATE
              value: "1"
            - name: AX_EVENTLOG_DSN
              valueFrom:
                secretKeyRef:
                  name: ax-eventlog-postgres
                  key: dsn
          volumeMounts:
            - name: ax-config
              mountPath: /etc/ax
      volumes:
        - name: ax-config
          configMap:
            name: ax-server-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ax-server-config
  namespace: ax
data:
  ax.yaml: |
    version: v1alpha
    eventlog:
      postgres:
        dsn: ${AX_EVENTLOG_DSN}
    harnesses:
      antigravity:
        default: true
      antigravity-interactions: {}
