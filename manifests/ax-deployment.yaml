# TODO(jbd): This yaml will eventually become the ax-deployment.yaml.tmpl.

# ---------------------------------------------------------------------------
# Namespaces
# ---------------------------------------------------------------------------
# Namespace "ax" is reserved for built-in harnesses. Users who bring their own
# harness images should add their own namespaces.
apiVersion: v1
kind: Namespace
metadata:
  name: ax
---
# ---------------------------------------------------------------------------
# Built-in harnesses
# ---------------------------------------------------------------------------
apiVersion: ate.dev/v1alpha1
kind: WorkerPool
metadata:
  name: ax-harness-workerpool
  namespace: ax
  labels:
    workload: ax-harness
spec:
  replicas: 5
  ateomImage: ${ATEOM_IMAGE}
---
apiVersion: ate.dev/v1alpha1
kind: ActorTemplate
metadata:
  name: ax-harness-template
  namespace: ax
spec:
  workerSelector:
    matchLabels:
      workload: ax-harness
  pauseImage: "gcr.io/gke-release/pause@sha256:bcbd57ba5653580ec647b16d8163cdd1112df3609129b01f912a8032e48265da"
  containers:
    - name: "axharness"
      image: ${AX_IMAGE}
      # Substrate ignores the image CMD/ENV/WORKDIR, so the harness command and
      # environment are specified here. `ax harness` forks the Antigravity Python
      # sidecar, which serves on port 80 because substrate DNATs workerPodIP:80.
      command: ["/ax-app/ax", "harness",
                "--antigravity-agent-file", "/ax-app/examples/antigravity_agent/agent.py",
                "--host", "0.0.0.0", "--port", "80"]
      env:
        - name: GEMINI_API_KEY
          value: "${GEMINI_API_KEY}"
        - name: PYTHONPATH
          value: "/ax-app:/ax-app/python"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: SKILLS_DIR
          value: "/ax-app/skills"
        - name: AX_HARNESS_WORKDIR
          value: "/ax"
  snapshotsConfig:
    location: gs://${BUCKET_NAME}/antigravity/
---

# ---------------------------------------------------------------------------
# Event log storage (PostgreSQL)
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: ax-eventlog-postgres
  namespace: ax
  labels:
    app: ax-eventlog-postgres
spec:
  selector:
    app: ax-eventlog-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Secret
metadata:
  name: ax-eventlog-postgres
  namespace: ax
type: Opaque
stringData:
  password: "${POSTGRES_PASSWORD}"
  dsn: "postgres://axuser:${POSTGRES_PASSWORD}@ax-eventlog-postgres.ax.svc:5432/axeventlog?sslmode=disable"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ax-eventlog-postgres
  namespace: ax
  labels:
    app: ax-eventlog-postgres
spec:
  serviceName: ax-eventlog-postgres
  replicas: 1
  selector:
    matchLabels:
      app: ax-eventlog-postgres
  template:
    metadata:
      labels:
        app: ax-eventlog-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: axeventlog
            - name: POSTGRES_USER
              value: axuser
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ax-eventlog-postgres
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "axuser", "-d", "axeventlog"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---

# ---------------------------------------------------------------------------
# AX Server
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: ax-server
  namespace: ax
  labels:
    app: ax-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ax-server
  template:
    metadata:
      labels:
        app: ax-server
    spec:
      containers:
        - name: ax-server
          image: ${AX_IMAGE}
          command: ["/ax-app/ax", "serve", "--config", "/etc/ax/ax.yaml"]
          ports:
            - containerPort: 8494
          env:
            - name: GEMINI_API_KEY
              value: "${GEMINI_API_KEY}"
            - name: AX_SUBSTRATE
              value: "1"
            - name: AX_EVENTLOG_DSN
              valueFrom:
                secretKeyRef:
                  name: ax-eventlog-postgres
                  key: dsn
          volumeMounts:
            - name: ax-config
              mountPath: /etc/ax
      volumes:
        - name: ax-config
          configMap:
            name: ax-server-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ax-server-config
  namespace: ax
data:
  ax.yaml: |
    eventlog:
      postgres:
        dsn: ${AX_EVENTLOG_DSN}
    harnesses:
      antigravity:
        default: true
