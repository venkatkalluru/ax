syntax = "proto3";

package ax;

import "google/protobuf/struct.proto";
import "proto/content.proto";

option go_package = "github.com/google/ax/proto";

// WARNING: This file is in active development and
// significant changes can be made with breaking changes.

// Message is a message in the history.
message Message {
  string role = 1;     // user, assistant, or model
  Content content = 2; // content of the message
}

// A conversation is the historical session that consist of
// a number of execution. A conversation cannot be continued
// before the last execution is completed or failed.
message ConversationEvent {
  string conversation_id = 1;
  int32 seq = 2;
  string exec_id = 3;
  string harness_id = 4;
  google.protobuf.Struct harness_config = 5;
  repeated Message messages = 6;
  State state = 7;
}

message HarnessStart {
  // Per-execution harness configuration.
  bytes harness_config = 1;
  repeated Message messages = 2;
}

// HarnessCancel aborts the in-flight harness execution.
message HarnessCancel {
  CancelReason reason = 1;
}

message HarnessRequest {
  string conversation_id = 1;
  string harness_id = 2;
  oneof type {
    HarnessStart start = 3;
    HarnessCancel cancel = 4;
  }
}

message HarnessOutputs {
  repeated Message messages = 1;
}

message Error {
  // A status code, corresponds to google.golang.org/grpc/codes.
  int32 code = 1;
  // A description of the error.
  string description = 2;
}

message HarnessEnd {
  // Terminal state for the harness execution.
  State state = 1;
  // Optional error details.
  Error error = 2;
}

message HarnessResponse {
  string conversation_id = 1;
  oneof type {
    HarnessOutputs outputs = 2;
    HarnessEnd end = 3;
  }
}

service HarnessService {
  // Connect drives one harness execution. The client sends
  // HarnessRequest{start} (and may send one HarnessRequest{cancel}
  // mid-stream), and the server streams zero or more HarnessResponse{outputs}
  // frames terminated by exactly one HarnessResponse{end}.
  rpc Connect(stream HarnessRequest) returns (stream HarnessResponse);
}

// State represents the state of an execution
enum State {
  STATE_UNSPECIFIED = 0;  // Unspecified state
  STATE_PENDING = 1;
  STATE_FAILED = 2;
  STATE_COMPLETED = 3;
  STATE_CANCELED = 4;
}

// CancelReason explains why an in-flight execution is canceled.
enum CancelReason {
  CANCEL_REASON_UNSPECIFIED = 0;
  CANCEL_REASON_USER_REQUESTED = 1;
  CANCEL_REASON_TIMEOUT = 2;
  CANCEL_REASON_INTERNAL_ERROR = 3;
}

// ExecRequest for executing.
message ExecRequest {
  string conversation_id = 1;            // Unique conversation identifier
  repeated Message inputs = 2;           // New inputs
  int32 last_seq = 3;                    // Last sequence number seen by the client

  string harness_id = 4;                 // Harness ID, empty selects the default harness
  bytes harness_config = 5;              // Per-request harness configuration (opaque JSON), if any
}

// ExecResponse contains the result of an execution.
message ExecResponse {
  repeated Message outputs = 1; // Output content
  int32 seq = 2;                // Seq of the outputs
}

service ControllerService {
  // Exec executes an agentic task or resumes an existing one with streaming responses
  // If the conversation_id already exists, it will be resumed.
  rpc Exec(ExecRequest) returns (stream ExecResponse);
}

message DeleteConversationRequest {
  string conversation_id = 1;
}

message DeleteConversationResponse {}

service ConversationService {
  // Deletes conversational events and all event log resources
  // for its children executions.
  rpc DeleteConversation(DeleteConversationRequest) returns (DeleteConversationResponse);
}
