syntax = "proto3";

package proto;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/any.proto";

option go_package = "github.com/google/ax/proto";

// ProcessRequest is an input to an agent.
message ProcessRequest {
  repeated Content contents = 1;
}

// ProcessResponse is an output from an agent.
// It can be returned in a streaming fashion.
message ProcessResponse {
  string checkpoint_id = 1;
  repeated Content contents = 2;
  bool from_cache = 3;
}

// TextContent represents a text content.
message TextContent {
  reserved 1, 2;
  reserved "type";
  string text = 3;
}

message ApprovalDecision {
  bool approved = 1;
}

message DeclineDecision {
  reserved 2;
  reserved "reason";
  bool declined = 1;
}

message ConfirmationContent {
  reserved 1, 2;
  reserved "type";
  string id = 3;
  string question = 4;
  oneof decision {
    ApprovalDecision approval = 5;
    DeclineDecision decline = 6;
  }
}

message FunctionCallContent {
  string name = 1;
  google.protobuf.Struct args = 2;
  string id = 3;
  bytes thought_signature = 4;
}

message FunctionResponseContent {
  string name = 1;
  google.protobuf.Struct response = 2;
  string id = 3;
}


// Content represents a message with role, type, mimetype, and data fields
message Content {
  reserved 1 to 4, 6 to 9, 11 to 25;

  oneof content {
    TextContent text = 10;
    ConfirmationContent confirmation = 26;
    FunctionCallContent function_call = 27;
    FunctionResponseContent function_response = 28;
  }

  string role = 1000; // The role of the content (e.g., "user", "assistant", "system")

  // TODO: Bring other types to the oneof to be
  // fully compatible with the Interactions Content message.
}

// ExecutionEvent is the entry in the event log. ExecutionEvents are used
// to record the actions taken place in the executor.
// The executor can replay the events for resumability.
message ExecutionEvent {
  string task_id = 2;
  string agent_id = 3;
  repeated Content inputs = 4;
  repeated Content outputs = 5;
  State state = 6;
  google.protobuf.Timestamp timestamp = 7;
  // string checkpoint_id = 10;
}

// HealthCheckRequest for agent health checks
message HealthCheckRequest {}

// HealthCheckResponse contains agent health status
message HealthCheckResponse {
  bool healthy = 1;
  string message = 2;
}

// AgentService defines the gRPC service for agent communication
service AgentService {
  // Process handles bidirectional streaming of content between controller and agent
  rpc Process(stream ProcessRequest) returns (stream ProcessResponse);

  // HealthCheck checks if the agent is healthy and responsive
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// State represents the state of an execution
enum State {
  STATE_UNSPECIFIED = 0;  // Unspecified state
  STATE_PENDING = 1;
  STATE_FAILED = 2;
  STATE_COMPLETED = 3;
}

// ExecRequest for executing.
message ExecRequest {
  string id = 1;                         // Unique execution identifier
  string agent_id = 2;                   // Agent ID, if empty planner is used
  google.protobuf.Any agent_config = 3;  // Agent configuration if any
  repeated Content inputs = 4;           // Input content to process
}

// ExecResponse contains the result of an execution.
message ExecResponse {
  repeated Content outputs = 1; // Output content
  State state = 2;              // Execution state
}

message ForkRequest {
  string src_id = 1;
  string src_checkpoint_id = 2; // Checkpoint ID within the source execution to fork from.
  string dest_id = 3; // New ID. If provided, must not exist.
}

message ForkResponse {
  string new_id = 1; // New task ID (in case it was generated or modified by server)
}

message RemoteAgentConfig {
  string address = 1;     // gRPC address for remote agents
}

// RegisterAgentRequest for registering an agent
message RegisterAgentRequest {
  string agent_id = 1;
  string name = 2;        // Human-readable name for the agent
  string description = 3; // Description of agent capabilities
  map<string, string> metadata = 4;
  oneof config {
    RemoteAgentConfig remote = 5;
  }
}

// RegisterAgentResponse contains registration result
message RegisterAgentResponse {
}

// AXService defines the gRPC service for AX operations
service AXService {
  // Exec executes an agentic task or resumes an existing one with streaming responses
  // If the execution id already exists, it will be resumed from the last checkpoint.
  rpc Exec(ExecRequest) returns (stream ExecResponse);

  // Fork forks an event log from a specific checkpoint.
  rpc Fork(ForkRequest) returns (ForkResponse);

  // RegisterAgent registers a new agent with the controller
  rpc RegisterAgent(RegisterAgentRequest) returns (RegisterAgentResponse);
}
