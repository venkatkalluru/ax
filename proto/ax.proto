syntax = "proto3";

package proto;

import "google/protobuf/timestamp.proto";
import "google/protobuf/any.proto";
import "google/protobuf/duration.proto";
import "proto/content.proto";

option go_package = "github.com/google/ax/proto";

// WARNING: This file is in active development and
// significant changes can be made with breaking changes.

message AgentStart {
  string agent_id = 1;
  google.protobuf.Any config = 2;
  repeated Message messages = 3;
}

message AgentOutputs {
  repeated Message messages = 1;

  // If true, these outputs are stored only in the execution log
  // (for resumption) and are not emitted to the client or stored
  // in the conversation history.
  bool internal_only = 2; 

  // TODO: Add awaiting_more field.
}

message AgentMessage {
  string exec_id = 1;
  oneof msg {
    AgentStart start = 2;
    AgentOutputs outputs = 3;
  }
}

// Message is a message in the history.
message Message {
  string role = 1;     // user, assistant, or model
  Content content = 2; // content of the message
}

// A conversation is the historical session that consist of
// a number of execution. A conversation cannot be continued
// before the last execution is completed or failed.
message ConversationEvent {
  string conversation_id = 1;
  int32 seq = 2;
  string exec_id = 3;
  repeated Message messages = 4;
  State state = 5;
}

// ExecutionEvent is the entry in the event log. ExecutionEvents are used
// to record the actions taken place in the executor.
// The executor can replay the events for resumability.
message ExecutionEvent {
  string exec_id = 1;
  string agent_id = 2;
  google.protobuf.Any agent_config = 3;
  repeated Message inputs = 4;
  repeated Message outputs = 5;
  State state = 6;
  google.protobuf.Timestamp timestamp = 7;
}

// HealthCheckRequest for agent health checks
message HealthCheckRequest {}

// HealthCheckResponse contains agent health status
message HealthCheckResponse {
  bool healthy = 1;
  string message = 2;
}

// AXAgentService defines the gRPC service for agent communication
service AXAgentService {
  // Connect is used by agents to connect to the controller.
  rpc Connect(stream AgentMessage) returns (stream AgentMessage);

  // HealthCheck checks if the agent is healthy and responsive
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// State represents the state of an execution
enum State {
  STATE_UNSPECIFIED = 0;  // Unspecified state
  STATE_PENDING = 1;
  STATE_FAILED = 2;
  STATE_COMPLETED = 3;
}

// ExecRequest for executing.
message ExecRequest {
  string conversation_id = 1;            // Unique conversation identifier
  repeated Message inputs = 2;           // New inputs
  int32 last_seen_seq = 3;               // Last sequence number seen by the client

  string agent_id = 4;                   // Agent ID, if empty planner is used
  google.protobuf.Any agent_config = 5;  // Agent configuration if any
}

// ExecResponse contains the result of an execution.
message ExecResponse {
  repeated Message outputs = 1; // Output content
  int32 seq = 2;                // Seq of the outputs
}

message RemoteAgentConfig {
  string address = 1;     // gRPC address for remote agents
}

// RegisterAgentRequest for registering an agent
message RegisterAgentRequest {
  string agent_id = 1;
  string name = 2;        // Human-readable name for the agent
  string description = 3; // Description of agent capabilities
  map<string, string> metadata = 4;
  oneof config {
    RemoteAgentConfig remote = 5;
  }
}

// RegisterAgentResponse contains registration result
message RegisterAgentResponse {
  bool healthy = 1;
}

// AXService defines the gRPC service for AX operations
service AXService {
  // Exec executes an agentic task or resumes an existing one with streaming responses
  // If the conversation_id already exists, it will be resumed.
  rpc Exec(ExecRequest) returns (stream ExecResponse);

  // RegisterAgent registers a new agent with the controller
  rpc RegisterAgent(RegisterAgentRequest) returns (RegisterAgentResponse);
}

message ListRequest {
  string conversation_id = 1;
}

message ListResponse {
  repeated ConversationEvent events = 1;
  // TODO: Do we need pagination?
}

message DeleteRequest {
  string conversation_id = 1;
}

message DeleteResponse {}

message ForkRequest {}

message ForkResponse {}

service AXEventLogService {
  // List conversational events.
  rpc List(ListRequest) returns (ListResponse);

  // Deletes conversational events and all event log resources
  // for its children executions.
  rpc Delete(DeleteRequest) returns (DeleteResponse);

  // Fork forks an event log from a specific conversation.
  rpc Fork(ForkRequest) returns (ForkResponse);
}

// GeminiConfig is the configuration for a Gemini agent.
message GeminiConfig {
  string model = 1;                       // e.g. "gemini-3-flash-preview"
  string system_prompt = 2;               // System prompt for the agent
  int32 max_tokens = 3;                   // Maximum number of tokens to generate
  google.protobuf.Duration timeout = 4;   // e.g. "10s"
  repeated string tools = 5;              // List of enabled tools (e.g. "google_search")
}
