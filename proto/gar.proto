syntax = "proto3";

package proto;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/google/gar/proto";

// Content represents a message with role, type, mimetype, and data fields
message Content {
  string role = 1;      // The role of the content (e.g., "user", "assistant", "system")
  string type = 2;      // The type of content (e.g., "text", "image")
  string mimetype = 3;  // MIME type of the data (e.g., "text/plain", "image/png")
  string data = 4;      // The actual content data
  string checkpoint_id = 5;  // Optional: Checkpoint ID for this content

  // TODO: Replace Content with Interactions Content.
}

// HealthCheckRequest for agent health checks
message HealthCheckRequest {}

// HealthCheckResponse contains agent health status
message HealthCheckResponse {
  bool healthy = 1;
  string message = 2;
}

// AgentService defines the gRPC service for agent communication
service AgentService {
  // Process handles bidirectional streaming of content between dispatcher and agent
  rpc Process(stream Content) returns (stream Content);

  // HealthCheck checks if the agent is healthy and responsive
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// State represents the state of a session
enum State {
  STATE_UNSPECIFIED = 0;  // Unspecified state
  STATE_RUNNING = 1;      // Session is currently running
  STATE_FAILED = 2;       // Session failed
  STATE_COMPLETED = 3;    // Completed, can accept new triggers

  // TODO(jbd): Add STATE_COMPLETED and only allow triggers if
  // the state is STATE_UNSPECIFIED or STATE_COMPLETED.
}

// TriggerSessionRequest for triggering a new session
message TriggerSessionRequest {
  string session_id = 1;               // Unique session identifier
  string checkpoint_id = 2;            // Optional: Resume from specific checkpoint UUID (empty for latest)
  repeated Content inputs = 3;         // Input content to process
}

// TriggerSessionResponse contains the result of triggering a session
message TriggerSessionResponse {
  string session_id = 1;  // Session ID (in case it was generated or modified by server)
  State state = 2;        // Session state
  Content output = 3;     // Output content
}

// GetSessionRequest for retrieving session details
message GetSessionRequest {
  string session_id = 1;
}

// SessionInfo contains session details
message SessionInfo {
  State state = 1;
  int32 current_step = 2;
  repeated string active_agents = 3;
  google.protobuf.Timestamp created_at = 4;  // Session creation time
  google.protobuf.Timestamp updated_at = 5;  // Last update time
  int32 message_count = 6;
  int32 checkpoint_count = 7;
}

// GetSessionResponse contains session information
message GetSessionResponse {
  SessionInfo session = 1;
}

// RegisterAgentRequest for registering an agent
message RegisterAgentRequest {
  string agent_id = 1;
  string name = 2;        // Human-readable name for the agent
  string description = 3; // Description of agent capabilities
  string address = 4;     // gRPC address for remote agents
  map<string, string> metadata = 5;
}

// RegisterAgentResponse contains registration result
message RegisterAgentResponse {
}

// UnregisterAgentRequest for unregistering an agent
message UnregisterAgentRequest {
  string agent_id = 1;
}

// UnregisterAgentResponse contains unregistration result
message UnregisterAgentResponse {
}

// GARService defines the gRPC service for GAR operations
service GARService {
  // TriggerSession triggers a new agentic loop session or resumes an existing one with streaming responses
  // If the session_id already exists, it will be resumed from the last checkpoint
  rpc TriggerSession(TriggerSessionRequest) returns (stream TriggerSessionResponse);

  // GetSession retrieves session details
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);

  // RegisterAgent registers a new agent with the controller
  rpc RegisterAgent(RegisterAgentRequest) returns (RegisterAgentResponse);

  // UnregisterAgent removes an agent from the controller
  rpc UnregisterAgent(UnregisterAgentRequest) returns (UnregisterAgentResponse);
}
